<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kuiz Napoleon Bonaparte - Interaktif</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; padding: 20px; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #34495e; }
        .soalan { margin: 20px 0 10px; font-weight: bold; }
        .pilihan { display: block; padding: 10px; margin: 5px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .pilihan:hover { background: #f0f0f0; }
        .betul { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .salah { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        /* Gaya untuk bahagian QR */
        #qrcode-section { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>⚔️ Kuiz Napoleon Bonaparte</h2>
    
    <div id="kuiz"></div>
    <button onclick="semakKuiz()">Semak Keputusan</button>
    <h3 id="skor" style="text-align: center;"></h3>

    <div id="qrcode-section">
        <p>Imbas untuk buka kuiz di telefon:</p>
        <div id="qrcode" style="display: flex; justify-content: center;"></div>
    </div>
</div>

<script>
    const dataKuiz = [
        { q: "Bilakah Napoleon dilahirkan?", a: ["15 Ogos 1769", "2 Disember 1804", "18 Jun 1815", "5 Mei 1821"], correct: 0 },
        { q: "Pertempuran yang menandakan kekalahan terakhir Napoleon?", a: ["Italy", "Austerlitz", "Jena-Auerstädt", "Waterloo"], correct: 3 },
        { q: "Gelaran yang diterima oleh Napoleon pada tahun 1804?", a: ["Presiden", "Maharaja Perancis", "Jeneral", "Raja Itali"], correct: 1 },
        { q: "Apakah maksud nilai kepimpinan 'Strategi Hebat'?", a: ["Pendidikan", "Bekerja keras", "Seni perang & taktik kilat", "Keputusan kritikal"], correct: 2 },
        { q: "Apakah fakta menarik berkaitan Napoleon?", a: ["Sangat tinggi", "Tidak suka membaca", "Nama di Arc de Triomphe", "Tidak pernah memimpin"], correct: 2 }
    ];

    // Papar Soalan
    const container = document.getElementById('kuiz');
    dataKuiz.forEach((item, i) => {
        container.innerHTML += `<div class="soalan">${i+1}. ${item.q}</div>`;
        item.a.forEach((pilihan, j) => {
            container.innerHTML += `<label class="pilihan" id="q${i}a${j}" onclick="pilih(${i}, ${j})">${pilihan}</label>`;
        });
    });

    let jawapanPilihan = Array(5).fill(null);
    function pilih(qIndex, aIndex) {
        jawapanPilihan[qIndex] = aIndex;
        document.querySelectorAll(`#q${qIndex}a${0}, #q${qIndex}a${1}, #q${qIndex}a${2}, #q${qIndex}a${3}`).forEach(el => el.style.background = "white");
        document.getElementById(`q${qIndex}a${aIndex}`).style.background = "#d6eaf8";
    }

    function semakKuiz() {
        let markah = 0;
        jawapanPilihan.forEach((pilih, i) => {
            if (pilih === dataKuiz[i].correct) {
                document.getElementById(`q${i}a${pilih}`).className = "pilihan betul";
                markah++;
            } else if (pilih !== null) {
                document.getElementById(`q${i}a${pilih}`).className = "pilihan salah";
                document.getElementById(`q${i}a${dataKuiz[i].correct}`).className = "pilihan betul";
            }
        });
        document.getElementById('skor').innerText = `Skor Akhir: ${markah} / 5`;
    }

    // Jana Kod QR automatik
    // Nota: Ini hanya akan berfungsi jika URL bermula dengan http/https
    if (window.location.protocol.startsWith('http')) {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    } else {
        document.getElementById("qrcode-section").innerHTML = "<p><em>Kod QR hanya muncul selepas dimuat naik ke pelayan web (hosting).</em></p>";
    }
</script>

</body>
</html>
